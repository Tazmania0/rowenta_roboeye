clean_room:
  name: Clean room(s)
  description: >
    Start a targeted clean of one or more rooms by their RobEye area IDs.
    The vacuum must be docked or idle.  Multiple room IDs are cleaned in sequence.
  target:
    entity:
      integration: rowenta_roboeye
      domain: vacuum
  fields:
    room_ids:
      name: Room IDs
      description: >
        List of area IDs to clean (integers or strings).
        Find IDs in the RobEye app map view or from the
        sensor.xplorer120_<room>_cleanings entity names.
      required: true
      example: "[3, 11]"
      selector:
        object:
    fan_speed:
      name: Fan speed
      description: >
        Optional fan speed override for this clean.
        Defaults to the current select.xplorer120_cleaning_mode value.
      required: false
      example: "high"
      selector:
        select:
          options:
            - "eco"
            - "normal"
            - "high"
            - "silent"
    deep_clean:
      name: Deep clean
      description: >
        When enabled, forces deep-clean strategy (double/triple pass) for this
        run only, overriding the global strategy setting.
      required: false
      default: false
      example: true
      selector:
        boolean:

remove_queue_entry:
  name: Remove queued command
  description: >
    Drop a pending command from the integration's serial command queue before
    it is dispatched to the robot.  Useful for cancelling a queued room clean
    that has not started yet.  Does not affect the command currently executing.
  target:
    entity:
      integration: rowenta_roboeye
      domain: vacuum
  fields:
    pending_index:
      name: Pending index
      description: >
        Zero-based position of the pending command to remove (0 = the next
        command that would run).  Defaults to 0.
      required: false
      default: 0
      example: 0
      selector:
        number:
          min: 0
          mode: box

