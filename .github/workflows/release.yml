name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create release zip
        run: |
          mkdir -p release
          cp -r custom_components release/
          cd release
          zip -r ../rowenta_roboeye.zip custom_components/
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rowenta_roboeye.zip
          generate_release_notes: true
